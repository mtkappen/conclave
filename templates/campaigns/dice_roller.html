<!-- Dice Roller Component -->
<div class="dice-roller-card">
    <h3 style="color: #007acc; margin-bottom: 1rem;">🎲 Quick Dice Roller</h3>
    
    <!-- Quick Roll Buttons -->
    <div class="quick-dice-buttons" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem;">
        <button class="dice-btn" onclick="quickRoll(4)">d4</button>
        <button class="dice-btn" onclick="quickRoll(6)">d6</button>
        <button class="dice-btn" onclick="quickRoll(8)">d8</button>
        <button class="dice-btn" onclick="quickRoll(10)">d10</button>
        <button class="dice-btn" onclick="quickRoll(12)">d12</button>
        <button class="dice-btn" onclick="quickRoll(20)">d20</button>
    </div>
    
    <!-- Custom Roll -->
    <div style="margin-bottom: 1rem;">
        <label style="font-size: 0.9rem;">Custom Roll:</label>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <input type="number" id="diceCount" value="1" min="1" max="10" 
                   style="width: 60px; padding: 0.5rem; background-color: #1e1e1e; border: 1px solid #3c3c3c; color: #d4d4d4; border-radius: 4px;">
            <select id="diceType" 
                    style="flex: 1; padding: 0.5rem; background-color: #1e1e1e; border: 1px solid #3c3c3c; color: #d4d4d4; border-radius: 4px;">
                <option value="4">d4</option>
                <option value="6">d6</option>
                <option value="8">d8</option>
                <option value="10">d10</option>
                <option value="12">d12</option>
                <option value="20" selected>d20</option>
            </select>
            <input type="number" id="modifier" value="0" 
                   style="width: 70px; padding: 0.5rem; background-color: #1e1e1e; border: 1px solid #3c3c3c; color: #d4d4d4; border-radius: 4px;"
                   placeholder="+0">
        </div>
    </div>
    
    <!-- Roll Options -->
    <div style="margin-bottom: 1rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;">
            <input type="checkbox" id="hideRoll" style="width: auto;">
            Hide from Players (DM Only)
        </label>
    </div>
    
    <button class="btn" onclick="rollDice()" style="width: 100%;">🎲 Roll Dice</button>
    
    <!-- Last Roll Result -->
    <div id="lastRollResult" style="margin-top: 1rem; padding: 1rem; background-color: #1e1e1e; border-radius: 4px; display: none; border: 1px solid #3c3c3c;">
        <p style="color: #858585; font-size: 0.9rem;">Last Roll:</p>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="lastRollFormula" style="color: #9b5de5; font-weight: bold;"></span>
            <span id="lastRollValue" style="color: #007acc; font-size: 1.5rem; font-weight: bold;"></span>
        </div>
    </div>
</div>

<style>
.dice-roller-card {
    background-color: #252526;
    border-radius: 8px;
    padding: 1.5rem;
    border: 1px solid #3c3c3c;
    width: 100%;
}

.dice-btn {
    padding: 0.75rem;
    background-color: #3c3c3c;
    color: #d4d4d4;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
}

.dice-btn:hover {
    background-color: #4c4c4c;
    transform: translateY(-2px);
}

.dice-btn:active {
    transform: translateY(0);
}
</style>

<script>
// Dice roller functions - these need to be globally accessible
    document.getElementById('diceCount').value = 1;
    document.getElementById('diceType').value = dieType;
    document.getElementById('modifier').value = 0;
    window.rollDice();
};

window.rollDice = async function() {
    const count = parseInt(document.getElementById('diceCount').value) || 1;
    const dieType = parseInt(document.getElementById('diceType').value) || 20;
    const modifier = parseInt(document.getElementById('modifier').value) || 0;
    const hideRoll = document.getElementById('hideRoll').checked;
    
    // Calculate result
    let total = 0;
    const rolls = [];
    
    for (let i = 0; i < count; i++) {
        const roll = Math.floor(Math.random() * dieType) + 1;
        rolls.push(roll);
        total += roll;
    }
    
    total += modifier;
    
    // Build formula string
    let formula = `${count}d${dieType}`;
    if (modifier !== 0) {
        formula += modifier > 0 ? `+${modifier}` : modifier;
    }
    
    console.log('Rolling dice:', formula, 'Result:', total);
    
    // Display result locally
    displayRollResult(formula, total);
    
        // Send to server
    try {
        const response = await fetch(`/campaign/${window.CAMPAIGN_ID}/dice/post/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': window.getCsrfToken()
            },
            body: JSON.stringify({
                formula: formula,
                result: total,
                modifier: modifier,
                visibility: hideRoll ? 'DM_ONLY' : 'PUBLIC'
            })
        });
        
        console.log('Response status:', response.status);
        
        const data = await response.json();
        console.log('Response data:', data);
        
        if (!data.success) {
            console.error('Error saving dice roll:', data.error);
            alert('Failed to save dice roll: ' + (data.error || 'Unknown error'));
        } else {
            console.log('Dice roll saved successfully!');
            // Refresh chat immediately to show the new dice roll message
            if (typeof window.loadChatMessages === 'function') {
                console.log('Refreshing chat messages...');
                await window.loadChatMessages();
            }
        }
    } catch (error) {
        console.error('Error posting dice roll:', error);
        alert('Failed to post dice roll: ' + error.message);
    }
};

window.displayRollResult = function(formula, result) {
    const resultDiv = document.getElementById('lastRollResult');
    const formulaSpan = document.getElementById('lastRollFormula');
    const valueSpan = document.getElementById('lastRollValue');
    
        formulaSpan.textContent = formula;
    valueSpan.textContent = result;
    resultDiv.style.display = 'block';
};

window.getCsrfToken = function() {
    return document.querySelector('[name=csrfmiddlewaretoken]')?.value || 
           document.cookie.split('; ').find(row => row.startsWith('csrftoken='))?.split('=')[1];
};

// Set CAMPAIGN_ID globally if not already set
if (typeof window.CAMPAIGN_ID === 'undefined') {
    window.CAMPAIGN_ID = "{{ campaign.pk }}" || 0;
}
</script>
